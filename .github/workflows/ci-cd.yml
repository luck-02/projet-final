name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [frontend, backend/catalogue, backend/orders]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml

      - name: Deploy to cluster
        env:
          KUBECONFIG: kubeconfig.yaml
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          kubectl apply -f k8s/namespaces/
          kubectl apply -f k8s/configmaps/
          kubectl set image deployment/catalogue catalogue=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend/catalogue:$IMAGE_TAG -n projet-final
          kubectl set image deployment/orders orders=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend/orders:$IMAGE_TAG -n projet-final
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:$IMAGE_TAG -n projet-final
          kubectl rollout status deployment/catalogue -n projet-final
          kubectl rollout status deployment/orders -n projet-final
          kubectl rollout status deployment/frontend -n projet-final
